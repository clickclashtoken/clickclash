<!DOCTYPE html>
<html>
<head>
  <title>ClickClash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0a0a0a, #000);
      color: white;
      text-align: center;
    }

    h1 {
      color: #00ff99;
      font-size: 10vw;
      text-shadow: 0 0 25px #00ff99;
    }

    .container { max-width: 420px; margin: auto; }

    .box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,255,153,0.2);
      margin: 12px;
      padding: 15px;
      border-radius: 15px;
    }

    .big { font-size: 24px; font-weight: bold; }
    .glow { color: #00ff99; }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      width: 80%;
      background: #111;
      color: white;
    }

    button {
      padding: 18px;
      font-size: 22px;
      border-radius: 12px;
      border: none;
      background: #00ff99;
      color: black;
      font-weight: bold;
      margin-top: 10px;
    }

    li { list-style: none; padding: 6px; }

    .rank1 { color: gold; }
    .rank2 { color: silver; }
    .rank3 { color: #cd7f32; }
  </style>
</head>

<body>

<h1>CLICKCLASH</h1>

<div class="container">

  <div class="box">
    <input id="username" placeholder="Enter username">
    <br>
    <button onclick="saveUsername()">ENTER</button>
  </div>

  <div id="game" style="display:none;">
    <div class="box">
      <div id="userDisplay" class="big"></div>
      <div class="big glow">🔥 <span id="count">0</span></div>
      <button onclick="clickButton()">TAP</button>
    </div>

    <div class="box">
      <div class="big">🏆 LEADERBOARD</div>
      <ul id="leaders"></ul>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD30l_bB2OMuaNPkT7gypFPS4vbzQ2KR9Y",
  authDomain: "clickclash-320b7.firebaseapp.com",
  projectId: "clickclash-320b7",
  storageBucket: "clickclash-320b7.firebasestorage.app",
  messagingSenderId: "984825762558",
  appId: "1:984825762558:web:2774cb8e4814afcbee8baf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;
let username = "";
let clicks = 0;

signInAnonymously(auth).then(u => userId = u.user.uid);

window.saveUsername = async function () {
  username = document.getElementById("username").value;

  const ref = doc(db, "users", userId);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    clicks = snap.data().clicks;
  } else {
    await setDoc(ref, { username, clicks: 0 });
  }

  document.getElementById("game").style.display = "block";
  document.getElementById("userDisplay").innerText = username;

  updateUI();
  loadLeaderboard();
};

window.clickButton = async function () {
  clicks++;

  await setDoc(doc(db, "users", userId), {
    username,
    clicks
  });

  updateUI();
};

function updateUI() {
  document.getElementById("count").innerText = clicks;
}

function loadLeaderboard() {
  const q = query(collection(db, "users"), orderBy("clicks", "desc"), limit(10));

  onSnapshot(q, (snapshot) => {
    const list = document.getElementById("leaders");
    list.innerHTML = "";

    let pos = 1;

    snapshot.forEach((docSnap) => {
      const data = docSnap.data();

      let cls = "";
      if (pos === 1) cls = "rank1";
      if (pos === 2) cls = "rank2";
      if (pos === 3) cls = "rank3";

      const li = document.createElement("li");
      li.className = cls;
      li.innerText = `#${pos} ${data.username} - ${data.clicks}`;

      list.appendChild(li);
      pos++;
    });
  });
}
</script>

</body>
</html>
