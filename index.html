<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Love You ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;

      min-height: 100vh;
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      background-attachment: fixed;

      color: white;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      position: absolute;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      animation: slideFade 3s ease forwards;
      z-index: 10;
      text-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    @keyframes slideFade {
      0% {
        transform: translateY(-100px);
        opacity: 0;
      }
      100% {
        transform: translateY(-50%);
        opacity: 1;
      }
    }

    /* CENTER BUTTON */
    #playBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;

      padding: 15px 25px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ff4d6d;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }

    .floating-img {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 12px;
      object-fit: cover;
      animation: float 12s infinite ease-in-out;
      opacity: 0.9;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(6deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    .heart {
      position: absolute;
      color: rgba(255,255,255,0.7);
      animation: rise 5s linear infinite;
    }

    @keyframes rise {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

  </style>
</head>

<body>

  <h1>I love you Thandolwethu Mabuza ❤️</h1>

  <!-- MUSIC -->
  <audio id="bgMusic" autoplay loop>
    <source src="love.mp3" type="audio/mpeg">
  </audio>

  <!-- CENTER BUTTON -->
  <button id="playBtn" onclick="playMusic()">Play Music 🎵</button>

  <!-- IMAGES -->
  <div id="images"></div>

  <script>
    function playMusic() {
      const music = document.getElementById("bgMusic");
      music.play();
      document.getElementById("playBtn").style.display = "none";
      loadImages();
      startHearts();
    }

    // SCATTER IMAGES RANDOMLY
    function loadImages() {
      const container = document.getElementById("images");

      for (let i = 1; i <= 30; i++) {
        const img = document.createElement("img");
        img.src = i + ".jpg";
        img.classList.add("floating-img");

        img.style.top = Math.random() * 90 + "vh";
        img.style.left = Math.random() * 90 + "vw";

        img.style.animationDelay = (Math.random() * 3) + "s";

        container.appendChild(img);
      }
    }

    function startHearts() {
      setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
      }, 250);
    }
  </script>

</body>
</html>
