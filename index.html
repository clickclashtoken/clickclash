<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Love You ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      position: absolute;
      width: 100%;
      top: 40%;
      transform: translateY(-50%);
      opacity: 0;
      animation: slideIn 3s ease forwards;
    }

    @keyframes slideIn {
      0% {
        transform: translateY(-100px);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .floating-img {
      position: absolute;
      width: 120px;
      border-radius: 15px;
      animation: float 10s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-50px) rotate(10deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    .img1 { top: 10%; left: 10%; animation-delay: 0s; }
    .img2 { top: 70%; left: 20%; animation-delay: 2s; }
    .img3 { top: 20%; right: 10%; animation-delay: 4s; }
    .img4 { bottom: 10%; right: 20%; animation-delay: 6s; }

    .hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      color: rgba(255,255,255,0.7);
      animation: rise 5s linear infinite;
    }

    @keyframes rise {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }

  </style>
</head>

<body>

  <h1>I love you Thandolwethu Mabuza ❤️</h1>

  <!-- Floating Images -->
  <img src="img1.jpg" class="floating-img img1">
  <img src="img2.jpg" class="floating-img img2">
  <img src="img3.jpg" class="floating-img img3">
  <img src="img4.jpg" class="floating-img img4">

  <!-- Background Music -->
  <audio autoplay loop>
    <source src="your-song.mp3" type="audio/mpeg">
  </audio>

  <!-- Hearts Animation -->
  <div class="hearts" id="hearts"></div>

  <script>
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 20 + 10 + "px";
      heart.style.animationDuration = Math.random() * 3 + 3 + "s";

      document.getElementById("hearts").appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
