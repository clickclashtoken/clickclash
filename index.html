<!DOCTYPE html>
<html>
<head>
  <title>ClickClash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0a0a0a, #000);
      color: white;
      text-align: center;
    }

    h1 {
      color: #00ff99;
      font-size: 10vw;
      text-shadow: 0 0 25px #00ff99;
    }

    .ticker {
      overflow: hidden;
      white-space: nowrap;
      border-bottom: 1px solid #00ff99;
      padding: 8px;
      font-size: 13px;
    }

    .ticker span {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 18s linear infinite;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .container {
      max-width: 420px;
      margin: auto;
    }

    .box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,255,153,0.2);
      margin: 12px;
      padding: 15px;
      border-radius: 15px;
    }

    .big { font-size: 24px; font-weight: bold; }
    .glow { color: #00ff99; }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      width: 80%;
      background: #111;
      color: white;
    }

    button {
      padding: 18px;
      font-size: 22px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #00ff99, #00cc77);
      color: black;
      font-weight: bold;
      margin-top: 10px;
    }

    button:active { transform: scale(0.95); }

    li { list-style: none; padding: 6px; }

    .rank1 { color: gold; font-weight: bold; font-size: 18px; }
    .rank2 { color: silver; }
    .rank3 { color: #cd7f32; }

    .me {
      background: rgba(0,255,153,0.15);
      border-radius: 8px;
    }

    .feed {
      text-align: left;
      font-size: 14px;
      color: #aaa;
      max-height: 100px;
      overflow: hidden;
    }

    .popup {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: #00ff99;
      color: black;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>CLICKCLASH</h1>

<div class="ticker">
  <span id="tickerText">Loading arena...</span>
</div>

<div class="container">

  <div class="box">
    <div class="big glow">⚡ LIVE BATTLE</div>
    <div id="online">Players joining...</div>
  </div>

  <div class="box">
    <input id="username" placeholder="Choose username">
    <br>
    <button onclick="saveUsername()">ENTER ARENA</button>
  </div>

  <div id="game" style="display:none;">

    <div class="box">
      <div id="userDisplay" class="big"></div>
      <div class="big glow">🔥 <span id="count">0</span> clicks</div>
      <div>🏆 Rank: <span id="rank">-</span></div>

      <button onclick="clickButton()">TAP</button>

      <div style="margin-top:10px;font-size:14px;color:#aaa;">
        👥 Invite friends to tap for you  
        <br>More taps = higher rank 🚀
      </div>
    </div>

    <div class="box">
      <div class="big">🏆 LEADERBOARD</div>
      <ul id="leaders"></ul>
    </div>

    <div class="box">
      <div class="big">📡 LIVE ACTIVITY</div>
      <div id="feed" class="feed"></div>
    </div>

  </div>

  <div class="box">
    <div class="big glow">🪙 $CLICK</div>
    <div>Launching soon</div>
    <div>Top players receive rewards</div>
    <div>Higher rank = higher allocation</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc,
  onSnapshot, collection, query, orderBy, limit
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD30l_bB2OMuaNPkT7gypFPS4vbzQ2KR9Y",
  authDomain: "clickclash-320b7.firebaseapp.com",
  projectId: "clickclash-320b7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let username = "";
let clicks = 0;

signInAnonymously(auth);

window.saveUsername = async function () {
  username = document.getElementById("username").value.trim().toLowerCase();

  if (!username) return alert("Enter username");

  const ref = doc(db, "users", username);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    clicks = snap.data().clicks;
  } else {
    await setDoc(ref, { username, clicks: 0 });
    clicks = 0;
  }

  document.getElementById("game").style.display = "block";
  document.getElementById("userDisplay").innerText = username;

  updateUI();
  loadLeaderboard();
};

window.clickButton = async function () {
  clicks++;

  if (clicks === 50 || clicks === 100 || clicks === 500) {
    showPopup("🔥 " + clicks + " clicks!");
  }

  await setDoc(doc(db, "users", username), {
    username,
    clicks
  });

  updateUI();
  addFeed(username + " tapped (" + clicks + ")");
};

function updateUI() {
  document.getElementById("count").innerText = clicks;
}

function loadLeaderboard() {
  const q = query(collection(db, "users"), orderBy("clicks", "desc"), limit(10));

  onSnapshot(q, (snap) => {
    const list = document.getElementById("leaders");
    list.innerHTML = "";

    let pos = 1;
    let ticker = "";

    snap.forEach((d) => {
      const data = d.data();

      let medal = "";
      if (pos === 1) medal = "🥇 ";
      else if (pos === 2) medal = "🥈 ";
      else if (pos === 3) medal = "🥉 ";

      ticker += `${data.username} pushing ${data.clicks} • `;

      const li = document.createElement("li");
      li.innerText = `${medal}#${pos} ${data.username} - ${data.clicks}`;

      if (data.username === username) {
        li.classList.add("me");
        document.getElementById("rank").innerText = "#" + pos;
      }

      if (pos === 1) li.classList.add("rank1");
      if (pos === 2) li.classList.add("rank2");
      if (pos === 3) li.classList.add("rank3");

      list.appendChild(li);
      pos++;
    });

    document.getElementById("tickerText").innerText = ticker;
  });
}

function addFeed(text) {
  const feed = document.getElementById("feed");
  const line = document.createElement("div");
  line.innerText = text;

  feed.prepend(line);

  if (feed.children.length > 8) {
    feed.removeChild(feed.lastChild);
  }
}

function showPopup(text) {
  const div = document.createElement("div");
  div.className = "popup";
  div.innerText = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1500);
}

setInterval(() => {
  const names = ["TapGod", "ClickX", "FastFinger", "SpeedTap"];
  const name = names[Math.floor(Math.random()*names.length)];
  const num = Math.floor(Math.random()*4000);

  addFeed(name + " reached " + num + " clicks");
}, 4000);

setInterval(() => {
  document.getElementById("online").innerText =
    Math.floor(Math.random() * 60 + 20) + " players battling";
}, 3000);

</script>

</body>
</html>
