<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Love You ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;

      min-height: 100vh;
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      text-align: center;
    }

    /* CENTER MESSAGE */
    h1 {
      font-size: 3rem;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-shadow: 0 5px 20px rgba(0,0,0,0.4);
    }

    /* CENTER BUTTON */
    #playBtn {
      position: absolute;
      top: 58%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;

      padding: 15px 25px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ff4d6d;
      font-weight: bold;
      cursor: pointer;
    }

    /* IMAGES */
    .floating-img {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: cover;
      opacity: 0.9;
    }

    /* HEARTS */
    .heart {
      position: absolute;
      color: rgba(255,255,255,0.7);
      animation: rise 5s linear infinite;
    }

    @keyframes rise {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

  </style>
</head>

<body>

  <h1>I love you Thandolwethu Mabuza ❤️</h1>

  <button id="playBtn" onclick="start()">Play Music 🎵</button>

  <audio id="music" loop>
    <source src="love.mp3" type="audio/mpeg">
  </audio>

  <div id="images"></div>

  <script>
    function start() {
      document.getElementById("music").play();
      document.getElementById("playBtn").style.display = "none";

      createOrbitImages();
      startHearts();
    }

    /* ORBIT ANIMATION AROUND CENTER */
    function createOrbitImages() {
      const container = document.getElementById("images");

      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      const radius = 200;

      for (let i = 1; i <= 30; i++) {
        const img = document.createElement("img");
        img.src = i + ".jpg";
        img.classList.add("floating-img");

        container.appendChild(img);

        let angle = (i / 30) * Math.PI * 2;
        let speed = 0.002 + Math.random() * 0.002;

        function animate() {
          angle += speed;

          const x = centerX + radius * Math.cos(angle);
          const y = centerY + radius * Math.sin(angle);

          img.style.left = x + "px";
          img.style.top = y + "px";

          requestAnimationFrame(animate);
        }

        animate();
      }
    }

    /* HEARTS */
    function startHearts() {
      setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
      }, 250);
    }
  </script>

</body>
</html>
