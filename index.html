<!DOCTYPE html>
<html>
<head>
  <title>ClickClash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0a0a0a, #000);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    h1 {
      color: #00ff99;
      font-size: 11vw;
      text-shadow: 0 0 25px #00ff99;
      margin-top: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding-bottom: 50px;
    }

    .box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,255,153,0.25);
      margin: 12px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,255,153,0.08);
    }

    .big { font-size: 24px; font-weight: bold; }
    .glow { color: #00ff99; text-shadow: 0 0 10px #00ff99; }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      width: 80%;
      background: #111;
      color: white;
      outline: none;
    }

    button {
      padding: 18px;
      font-size: 22px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #00ff99, #00cc77);
      color: black;
      font-weight: bold;
      margin-top: 10px;
      box-shadow: 0 0 15px #00ff99;
      cursor: pointer;
    }

    button:active { transform: scale(0.95); }

    #ticker {
      white-space: nowrap;
      overflow: hidden;
      border-bottom: 1px solid #00ff99;
      padding: 8px;
      color: #aaa;
      font-size: 13px;
    }

    #ticker span {
      display: inline-block;
      animation: scroll 15s linear infinite;
      padding-left: 100%;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    li {
      list-style: none;
      padding: 6px;
      font-size: 16px;
    }

    .rank1 { color: gold; }
    .rank2 { color: silver; }
    .rank3 { color: #cd7f32; }

    .me {
      background: rgba(0,255,153,0.1);
      border-radius: 8px;
    }

    .pulse {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>

<h1>CLICKCLASH</h1>

<div id="ticker"><span id="tickerText">Loading arena...</span></div>

<div class="container">

  <div class="box">
    <div class="big glow pulse">⚡ LIVE BATTLE</div>
    <div id="online">Players joining...</div>
  </div>

  <div class="box">
    <input id="username" placeholder="Choose username">
    <br>
    <button onclick="saveUsername()">ENTER ARENA</button>
  </div>

  <div id="game" style="display:none;">

    <div class="box">
      <div class="big" id="userDisplay"></div>
      <div class="big glow">🔥 <span id="count">0</span> clicks</div>
      <button onclick="clickButton()">TAP</button>
    </div>

    <div class="box">
      <div class="big">🏆 LEADERBOARD</div>
      <ul id="leaders"></ul>
    </div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  onSnapshot,
  collection,
  query,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD30l_bB2OMuaNPkT7gypFPS4vbzQ2KR9Y",
  authDomain: "clickclash-320b7.firebaseapp.com",
  projectId: "clickclash-320b7",
  storageBucket: "clickclash-320b7.firebasestorage.app",
  messagingSenderId: "984825762558",
  appId: "1:984825762558:web:2774cb8e4814afcbee8baf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let username = "";
let clicks = 0;

signInAnonymously(auth);

window.saveUsername = async function () {
  username = document.getElementById("username").value.trim().toLowerCase();

  if (!username) return alert("Enter username");

  const ref = doc(db, "users", username);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    clicks = snap.data().clicks;
  } else {
    await setDoc(ref, { username, clicks: 0 });
    clicks = 0;
  }

  document.getElementById("game").style.display = "block";
  document.getElementById("userDisplay").innerText = username;

  updateUI();
  loadLeaderboard();
};

window.clickButton = async function () {
  clicks++;

  await setDoc(doc(db, "users", username), {
    username,
    clicks
  });

  updateUI();
};

function updateUI() {
  document.getElementById("count").innerText = clicks;
}

function loadLeaderboard() {
  const q = query(collection(db, "users"), orderBy("clicks", "desc"), limit(10));

  onSnapshot(q, (snap) => {
    const list = document.getElementById("leaders");
    list.innerHTML = "";

    let pos = 1;
    let ticker = "";

    snap.forEach((d) => {
      const data = d.data();

      ticker += `${data.username}(${data.clicks}) • `;

      const li = document.createElement("li");
      li.innerText = `#${pos} ${data.username} - ${data.clicks}`;

      if (data.username === username) {
        li.classList.add("me");
      }

      list.appendChild(li);
      pos++;
    });

    document.getElementById("tickerText").innerText = ticker;
  });
}

// fake online count (visual only)
setInterval(() => {
  document.getElementById("online").innerText =
    Math.floor(Math.random() * 60 + 20) + " players in arena";
}, 2500);

</script>

</body>
</html>
