<!DOCTYPE html>
<html>
<head>
  <title>ClickClash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #050505, #000);
      color: white;
      text-align: center;
    }

    h1 {
      color: #00ff99;
      font-size: 11vw;
      text-shadow: 0 0 30px #00ff99;
      margin-bottom: 5px;
    }

    .box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,255,153,0.2);
      margin: 12px;
      padding: 16px;
      border-radius: 16px;
    }

    .big { font-size: 22px; font-weight: bold; }
    .glow { color: #00ff99; }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      width: 80%;
      background: #111;
      color: white;
    }

    button {
      padding: 14px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #00ff99;
      color: black;
      margin-top: 10px;
    }

    .feed { text-align:left; font-size:13px; max-height:120px; overflow:hidden; }

    .popup {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: #00ff99;
      color: black;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>CLICKCLASH</h1>
<div>Only early players win</div>

<div class="box">
  <input id="username" placeholder="Enter name">
  <br>
  <button onclick="start()">ENTER</button>
</div>

<div id="game" style="display:none;">

  <div class="box">
    <div id="userDisplay"></div>

    <div class="big glow">🔥 <span id="count">0</span></div>
    <div>🏆 Rank: <span id="rank">-</span></div>

    <div>💰 Est: <span id="value">0</span> $CLICK</div>

    <button onclick="tap()">TAP</button>
    <button onclick="boost()">⚡ BOOST</button>

    <div>
      Invite = +200 clicks<br>
      Top players win snapshot
    </div>
  </div>

  <div class="box">
    <div class="big">📡 LIVE</div>
    <div id="feed" class="feed"></div>
  </div>

</div>

<div class="box">
  ⚠️ SNAPSHOT ANYTIME<br>
  Top ranks get biggest allocation
</div>

<script>
let username="";
let clicks=0;
let boostActive=false;
let fakePlayers=[];

function start(){
  username=document.getElementById("username").value;
  if(!username) return;

  document.getElementById("game").style.display="block";
  document.getElementById("userDisplay").innerText=username;

  // generate fake players
  for(let i=0;i<20;i++){
    fakePlayers.push({
      name:"Player"+Math.floor(Math.random()*9999),
      clicks:Math.floor(Math.random()*2000)
    });
  }

  update();
}

function tap(){
  clicks += boostActive ? 2 : 1;
  update();
}

function boost(){
  boostActive=true;
  popup("⚡ BOOST ACTIVE");

  setTimeout(()=>{
    boostActive=false;
    popup("BOOST ENDED");
  },8000);
}

function update(){
  document.getElementById("count").innerText=clicks;
  document.getElementById("value").innerText=Math.floor(clicks*0.9);

  // rank simulation
  let rank = 1 + fakePlayers.filter(p=>p.clicks>clicks).length;
  document.getElementById("rank").innerText="#"+rank;
}

// fake competition growth
setInterval(()=>{
  fakePlayers.forEach(p=>{
    p.clicks += Math.floor(Math.random()*20);
  });
  update();
},2000);

// whale spikes (THIS IS KEY)
setInterval(()=>{
  let whale = "Whale"+Math.floor(Math.random()*100);
  let amount = Math.floor(Math.random()*5000+3000);

  fakePlayers.push({name:whale, clicks:amount});

  popup("🐋 "+whale+" just entered top ranks");

  feed(whale+" just secured massive position");
},10000);

// feed
function feed(text){
  let f=document.getElementById("feed");
  let d=document.createElement("div");
  d.innerText=text;
  f.prepend(d);

  if(f.children.length>10) f.removeChild(f.lastChild);
}

setInterval(()=>{
  let msgs=[
    "climbing fast",
    "entered top 10",
    "locking allocation",
    "gaining advantage"
  ];
  let name="User"+Math.floor(Math.random()*999);

  feed(name+" "+msgs[Math.floor(Math.random()*msgs.length)]);
},2500);

// snapshot pressure
setInterval(()=>{
  if(Math.random()>0.8){
    popup("⚠️ Snapshot scanning...");
  }
  if(Math.random()>0.9){
    popup("🔥 Snapshot imminent");
  }
},7000);

function popup(t){
  let d=document.createElement("div");
  d.className="popup";
  d.innerText=t;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1500);
}
</script>

</body>
</html>
