<!DOCTYPE html>
<html>
<head>
<title>CLICKCLASH</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top,#050505,#000);
  color:white;
  text-align:center;
}

h1 {
  color:#00ff99;
  font-size:10vw;
  text-shadow:0 0 40px #00ff99;
  margin-bottom:0;
}

.subtitle {
  color:#777;
  margin-bottom:15px;
}

.container {
  max-width:420px;
  margin:auto;
  padding-bottom:40px;
}

.box {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,153,0.2);
  margin:12px;
  padding:16px;
  border-radius:16px;
}

input {
  padding:14px;
  font-size:16px;
  border-radius:10px;
  border:none;
  width:80%;
  background:#111;
  color:white;
}

button {
  padding:16px;
  font-size:18px;
  border-radius:12px;
  border:none;
  background:linear-gradient(45deg,#00ff99,#00cc77);
  color:black;
  font-weight:bold;
  margin-top:10px;
  width:90%;
  box-shadow:0 0 20px #00ff99;
  cursor:pointer;
}

button:active {
  transform:scale(0.95);
}

.count {
  font-size:28px;
  color:#00ff99;
}

.feed {
  text-align:left;
  font-size:13px;
  color:#aaa;
  max-height:140px;
  overflow:hidden;
}

.ticker {
  border-bottom:1px solid #00ff99;
  padding:6px;
  font-size:12px;
  color:#888;
  white-space:nowrap;
  overflow:hidden;
}

.ticker span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 18s linear infinite;
}

@keyframes scroll {
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

.popup {
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#00ff99;
  color:black;
  padding:12px;
  border-radius:10px;
}

.token {
  font-size:12px;
  color:#00ff99;
  word-break:break-all;
}

.bar {
  height:8px;
  background:#111;
  border-radius:8px;
  margin-top:10px;
}

.bar-inner {
  height:100%;
  width:0%;
  background:#00ff99;
}
</style>
</head>

<body>

<h1>CLICKCLASH</h1>
<div class="subtitle">Early wallets win. Late wallets watch.</div>

<div class="ticker">
<span id="ticker">Loading market activity...</span>
</div>

<div class="container">

<div class="box">
<input id="username" placeholder="Choose identity">
<br>
<button onclick="start()">ENTER ARENA</button>
</div>

<div id="game" style="display:none;">

<div class="box">
<div id="user"></div>
<div class="count" id="count">0</div>
<div style="color:#777;">clicks</div>

<div class="bar">
<div class="bar-inner" id="progress"></div>
</div>

<button onclick="tap()">TAP</button>
</div>

<div class="box">
<div style="font-weight:bold;">📡 LIVE FEED</div>
<div id="feed" class="feed"></div>
</div>

</div>

<div class="box">

<div style="font-weight:bold;">📊 LIVE MARKET</div>

<div style="margin-top:10px;">
🐋 Biggest Buy:
<div id="whale">Waiting...</div>
</div>

<div style="margin-top:15px;">
⚡ Latest Buy:
<div id="latest">Waiting...</div>
</div>

</div>

<div class="box">

<div style="font-weight:bold;">🪙 $CLICK</div>

<div class="token">
E5uyXBUcJztmtoWGFrheBww5q7CL4JhqPtnDV4rQpump
</div>

<button onclick="copy()">Copy Address</button>

<a href="https://pump.fun/coin/E5uyXBUcJztmtoWGFrheBww5q7CL4JhqPtnDV4rQpump" target="_blank">
<button onclick="buy()">🚀 BUY NOW</button>
</a>

</div>

</div>

<script>
const API = "https://clickclash-backend.onrender.com/api/buys";

let shown = new Set();
let biggest = 0;

let username = "";
let clicks = 0;

function start(){
  username = document.getElementById("username").value || "anon";
  document.getElementById("game").style.display="block";
  document.getElementById("user").innerText=username;
}

function tap(){
  clicks++;

  document.getElementById("count").innerText = clicks;

  let progress = Math.min(clicks * 2, 100);
  document.getElementById("progress").style.width = progress + "%";

  addFeed(username + " tapped ⚡");
}

function buy(){
  addFeed(username + " entered position 🚀");
  popup("Opening buy page...");
}

async function loadBuys(){

  try{
    const res = await fetch(API);
    const data = await res.json();

    data.forEach(b => {

      const id = b.wallet + b.amount;
      if(shown.has(id)) return;

      shown.add(id);

      const txt = `🐋 ${short(b.wallet)} bought ${Number(b.amount).toFixed(2)} SOL`;

      addFeed(txt);

      document.getElementById("latest").innerText = txt;

      if(b.amount > biggest){
        biggest = b.amount;
        document.getElementById("whale").innerText = txt;
      }

    });

  }catch(e){}
}

function short(w){
  if(!w) return "wallet";
  return w.slice(0,4)+"..."+w.slice(-4);
}

function addFeed(text){

  const feed = document.getElementById("feed");

  const div = document.createElement("div");
  div.innerText = text;

  feed.prepend(div);

  const ticker = document.getElementById("ticker");
  ticker.innerText += " • " + text;
}

function popup(text){
  const d = document.createElement("div");
  d.className="popup";
  d.innerText=text;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1500);
}

function copy(){
  navigator.clipboard.writeText("E5uyXBUcJztmtoWGFrheBww5q7CL4JhqPtnDV4rQpump");
  popup("Copied");
}

setInterval(loadBuys,4000);
loadBuys();
</script>

</body>
</html>
